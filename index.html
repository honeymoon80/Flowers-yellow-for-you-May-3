<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>Mensaje Especial</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Courier New', monospace; }
        body {
            background:#000; color:#fff; min-height:100vh; overflow:hidden;
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            position:relative;
        }
        .space { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; overflow:hidden; }
        .particle {
            position:absolute; background:#fff; border-radius:50%; animation:fall linear infinite; opacity:0.8;
        }
        @keyframes fall {
            0% { transform:translateY(-10px); opacity:0; }
            10% { opacity:1; }
            100% { transform:translateY(100vh); opacity:0; }
        }
        .container { text-align:center; padding:20px; max-width:1000px; z-index:10; }
        .title {
            font-size:3.2rem; margin-bottom:30px; color:yellow; text-shadow:0 0 10px yellow, 0 0 20px yellow;
            opacity:0; transform:translateY(50px); transition:opacity 2s, transform 2s; font-weight:900;
        }
        .title.visible { opacity:1; transform:translateY(0); }
        .message {
            font-size:1.9rem; margin:25px 0; color:#fff; text-shadow:0 0 10px #fff;
            opacity:0; transform:translateY(50px); transition:opacity 2s, transform 2s;
        }
        .message.visible { opacity:1; transform:translateY(0); }
        .message.red { color:yellow; text-shadow:0 0 15px yellow; }
        .button { margin-top:60px; opacity:0; transition:opacity 2s; }
        .button.visible { opacity:1; }
        .btn {
            background:transparent; border:2px solid #9900ff; padding:16px 45px; font-size:1.6rem;
            color:#9500ff; border-radius:8px; cursor:pointer; box-shadow:0 0 15px rgba(255,0,0,0.7);
            transition:all 0.3s; font-weight:700;
        }
        .btn:hover { background:rgba(255,0,0,0.2); box-shadow:0 0 30px rgba(255,0,0,0.9); transform:scale(1.08); }
        @media (max-width:768px) {
            .title { font-size:2.4rem; }
            .message { font-size:1.45rem; }
            .btn { padding:12px 35px; font-size:1.3rem; }
        }
    </style>
</head>
<body>
    <div class="space" id="space"></div>
    <div class="container">
        <h1 class="title" id="title">FELIZ DÍA DE LAS FLORES AMARILLAS</h1>
        <p class="message red" id="message1">mi bellíshima amolshita May de mi korashon🥹💗🌸</p>
        <p class="message" id="message2">TENGO UN REGALO ESPECIAL PARA TI <3💐🌟</p>
        <div class="button" id="button">
            <button class="btn" onclick="location.href='index1.html'">VER TU REGALO</button>
        </div>
    </div>

    <script>
        function createSpace() {
            const space = document.getElementById('space');
            for (let i = 0; i < 120; i++) createParticle(space);
            setInterval(() => createParticle(space), 180);
        }
        function createParticle(container) {
            const p = document.createElement('div');
            p.classList.add('particle');
            const size = Math.random() * 2.5 + 1;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 10 + 6) + 's';
            p.style.animationDelay = Math.random() * 6 + 's';
            container.appendChild(p);
            setTimeout(() => p.remove(), 18000);
        }
        function showElements() {
            setTimeout(() => document.getElementById('title').classList.add('visible'), 800);
            setTimeout(() => document.getElementById('message1').classList.add('visible'), 3200);
            setTimeout(() => document.getElementById('message2').classList.add('visible'), 6200);
            setTimeout(() => document.getElementById('button').classList.add('visible'), 9200);
        }
        window.onload = () => { createSpace(); showElements(); };
    </script>
</body>
</html>
