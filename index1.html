<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>FLORES PROTEGIDAS</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: #ffff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffff00, 0 0 20px #ffff00;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-100px) translateX(0); }
            100% { transform: translateY(100vh) translateX(30px); }
        }

        .final-message {
            position: fixed;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            max-width: 85%;
            font-size: 2.2rem;
            line-height: 1.45;
            color: red;
            text-shadow: 0 0 25px red, 0 0 55px red;
            background: rgba(0,0,0,0.75);
            padding: 25px 30px;
            border-radius: 20px;
            opacity: 0;
            z-index: 30;
            text-align: center;
        }
        .final-message.active {
            opacity: 1;
            animation: text-pulse 2.5s infinite alternate;
        }
        @keyframes text-pulse {
            from { text-shadow: 0 0 40px yellow; }
            to   { text-shadow: 0 0 80px yellow, 0 0 120px yellow; }
        }
    </style>
</head>

    <audio id="background-music" loop>
        <source src="her’s - harvey (sped up).m4a" type="audio/mpeg">
    </audio>

    <script>
        window.addEventListener('load', function() {
            const music = document.getElementById('background-music');
            music.play().catch(() => {
                document.body.addEventListener('click', () => music.play(), {once: true});
            });

            setTimeout(startParticles, 2000);
            setTimeout(startEffectsSequence, 6500);
        });

        function startParticles() {
            const cont = document.getElementById('particles');
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 9 + 6) + 's';
                cont.appendChild(p);
                setTimeout(() => p.remove(), 18000);
            }, 280);
        }

        function startEffectsSequence() {
            const message = "floresh tan dichosas y afortunadas de ser el bello regalito de tan bella mujelshita de toditash mi fantasías y deseitos de miel🫶💗🌸";
            const auraText = document.getElementById('aura-text');
            const finalMessage = document.getElementById('final-message');

            auraText.style.opacity = '1';
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            auraText.appendChild(cursor);

            let i = 0;
            function type() {
                if (i < message.length) {
                    auraText.innerHTML = message.substring(0, i+1) + cursor.outerHTML;
                    i++;
                    setTimeout(type, 75);
                } else {
                    cursor.remove();
                    setTimeout(() => {
                        auraText.style.opacity = '0';
                        finalMessage.textContent = message;
                        finalMessage.classList.add('active');
                    }, 1400);
                }
            }
            type();
        }
    </script>
