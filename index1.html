<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>FLORES PROTEGIDAS</title>
    <link rel="stylesheet" href="css/main.css">

    <style>
        .particles {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 10; overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: #ffff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffff00, 0 0 20px #ffff00;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-100px) translateX(0); }
            100% { transform: translateY(100vh) translateX(30px); }
        }

        .aura-text {
            position: fixed;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Courier New', monospace;
            font-size: 2.2rem;
            color: #8a2be2;
            text-shadow: 0 0 15px #8a2be2;
            text-align: center;
            z-index: 25;
            opacity: 0;
            white-space: pre-line;
            max-width: 90%;
            pointer-events: none;
        }
        .aura-text.active {
            opacity: 1;
            animation: glitch 0.3s infinite;
        }
        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 15px #8a2be2; }
            50% { text-shadow: 2px 0 15px #ff00ff, -2px 0 15px #00ffff; }
        }

        .final-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Courier New', monospace;
            font-size: 2.1rem;
            line-height: 1.4;
            color: red;
            text-shadow: 0 0 30px red, 0 0 60px red;
            text-align: center;
            max-width: 85%;
            background: rgba(0,0,0,0.65);
            padding: 30px 40px;
            border-radius: 15px;
            opacity: 0;
            z-index: 30;
            transition: all 1.5s ease;
        }
        .final-message.active {
            opacity: 1;
            animation: text-pulse 2.5s infinite alternate;
        }
        @keyframes text-pulse {
            from { text-shadow: 0 0 30px red, 0 0 60px red; }
            to   { text-shadow: 0 0 50px red, 0 0 100px red, 0 0 140px red; }
        }

        .flower { transition: transform 0.8s ease; }
    </style>
</head>
<body class="container">

    <div class="night"></div>
    <div class="particles" id="particles"></div>

    <!-- Texto hacker -->
    <div class="aura-text" id="aura-text"></div>

    <!-- Mensaje final con TU texto -->
    <div class="final-message" id="final-message">
        floresh tan dichosas y afortunadas de ser el bello regalito<br>
        de tan bella mujelshita de toditash mi fantasías y deseitos de miel🫶💗🌸
    </div>

    <div class="flowers">
        <!-- FLORES COMPLETAS -->
        <div class="flower flower--1">
            <div class="flower__leafs flower__leafs--1">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__white-circle"></div>
                <div class="flower__light flower__light--1"></div>
                <div class="flower__light flower__light--2"></div>
                <div class="flower__light flower__light--3"></div>
                <div class="flower__light flower__light--4"></div>
                <div class="flower__light flower__light--5"></div>
                <div class="flower__light flower__light--6"></div>
                <div class="flower__light flower__light--7"></div>
                <div class="flower__light flower__light--8"></div>
            </div>
            <div class="flower__line">
                <div class="flower__line__leaf flower__line__leaf--1"></div>
                <div class="flower__line__leaf flower__line__leaf--2"></div>
                <div class="flower__line__leaf flower__line__leaf--3"></div>
                <div class="flower__line__leaf flower__line__leaf--4"></div>
                <div class="flower__line__leaf flower__line__leaf--5"></div>
                <div class="flower__line__leaf flower__line__leaf--6"></div>
            </div>
        </div>

        <div class="flower flower--2">
            <div class="flower__leafs flower__leafs--2">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__white-circle"></div>
                <div class="flower__light flower__light--1"></div>
                <div class="flower__light flower__light--2"></div>
                <div class="flower__light flower__light--3"></div>
                <div class="flower__light flower__light--4"></div>
                <div class="flower__light flower__light--5"></div>
                <div class="flower__light flower__light--6"></div>
                <div class="flower__light flower__light--7"></div>
                <div class="flower__light flower__light--8"></div>
            </div>
            <div class="flower__line">
                <div class="flower__line__leaf flower__line__leaf--1"></div>
                <div class="flower__line__leaf flower__line__leaf--2"></div>
                <div class="flower__line__leaf flower__line__leaf--3"></div>
                <div class="flower__line__leaf flower__line__leaf--4"></div>
            </div>
        </div>

        <div class="flower flower--3">
            <div class="flower__leafs flower__leafs--3">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__white-circle"></div>
                <div class="flower__light flower__light--1"></div>
                <div class="flower__light flower__light--2"></div>
                <div class="flower__light flower__light--3"></div>
                <div class="flower__light flower__light--4"></div>
                <div class="flower__light flower__light--5"></div>
                <div class="flower__light flower__light--6"></div>
                <div class="flower__light flower__light--7"></div>
                <div class="flower__light flower__light--8"></div>
            </div>
            <div class="flower__line">
                <div class="flower__line__leaf flower__line__leaf--1"></div>
                <div class="flower__line__leaf flower__line__leaf--2"></div>
                <div class="flower__line__leaf flower__line__leaf--3"></div>
                <div class="flower__line__leaf flower__line__leaf--4"></div>
            </div>
        </div>

        <div class="grow-ans" style="--d:1.2s">
            <div class="flower__g-long">
                <div class="flower__g-long__top"></div>
                <div class="flower__g-long__bottom"></div>
            </div>
        </div>

        <div class="growing-grass">
            <div class="flower__grass flower__grass--1">
                <div class="flower__grass--top"></div>
                <div class="flower__grass--bottom"></div>
                <div class="flower__grass__leaf flower__grass__leaf--1"></div>
                <div class="flower__grass__leaf flower__grass__leaf--2"></div>
                <div class="flower__grass__leaf flower__grass__leaf--3"></div>
                <div class="flower__grass__leaf flower__grass__leaf--4"></div>
                <div class="flower__grass__leaf flower__grass__leaf--5"></div>
                <div class="flower__grass__leaf flower__grass__leaf--6"></div>
                <div class="flower__grass__leaf flower__grass__leaf--7"></div>
                <div class="flower__grass__leaf flower__grass__leaf--8"></div>
                <div class="flower__grass__overlay"></div>
            </div>
        </div>

        <!-- Puedes duplicar más growing-grass si quieres más pasto -->
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 80; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 8 + 6) + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.opacity = Math.random() * 0.7 + 0.5;
                container.appendChild(p);
                setTimeout(() => p.remove(), 20000);
            }
        }

        function typeWriter(element, text, speed = 70) {
            let i = 0;
            element.innerHTML = '';
            element.classList.add('active');
            const interval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(interval);
                }
            }, speed);
        }

        window.onload = () => {
            createParticles();

            const auraText = document.getElementById('aura-text');
            const finalMsg = document.getElementById('final-message');

            // Efecto hacker
            setTimeout(() => {
                typeWriter(auraText, "MI FLOR AMARILLA...\nTE ESPERABA DESDE HACE TIEMPO", 70);
            }, 8500);

            // Mensaje final
            setTimeout(() => {
                finalMsg.classList.add('active');
            }, 14500);
        };
    </script>
</body>
</html>
