<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>FLORES PROTEGIDAS</title>
    <style>
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #ffff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffff00, 0 0 20px #ffff00;
            animation: fall linear infinite;
            z-index: 10;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) translateX(0); }
            100% { transform: translateY(100vh) translateX(30px); }
        }

        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300vw;
            height: 170vh;
            background: radial-gradient(circle, rgba(138,43,226,0.15) 0%, rgba(75,0,130,0.1) 40%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.7;
            animation: aura-expand 8s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes aura-expand {
            0%,100% { transform: translate(-50%,-50%) scale(0.95); opacity:0.5; }
            50% { transform: translate(-50%,-50%) scale(1.05); opacity:0.8; }
        }

        .flowers { position: relative; z-index: 5; }

        .aura-text {
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            z-index: 25;
            pointer-events: none;
            width: 90%;
            max-width: 900px;
            padding: 0 20px;
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 32px;
            background-color: #8a2be2;
            margin-left: 5px;
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .final-message {
            position: fixed;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Courier New', monospace;
            text-align: center;
            color: #8a2be2;
            text-shadow: 0 0 15px #8a2be2;
            opacity: 0;
            z-index: 30;
            pointer-events: none;
            font-size: 2.2rem;
            line-height: 1.45;
            white-space: pre-line;
            max-width: 85%;
            padding: 25px;
            background: rgba(0,0,0,0.65);
            border-radius: 20px;
        }

        .final-message.active {
            color: red;
            text-shadow: 0 0 25px red, 0 0 50px red, 0 0 90px red;
            animation: text-pulse 2s infinite alternate;
            opacity: 1;
        }

        @keyframes text-pulse {
            from { text-shadow: 0 0 35px yellow, 0 0 65px yellow; }
            to   { text-shadow: 0 0 60px yellow, 0 0 110px yellow; }
        }

        .flower__line { background-color: #107b17 !important; box-shadow: 0 0 5px #107b17, 0 0 10px #107b17 !important; }
        .flower__leaf { background-color: #0ca518 !important; box-shadow: 0 0 10px #0ca518, 0 0 20px #0ca518 !important; }
        .flower__leaf::before { background-color: #26b31f !important; box-shadow: 0 0 10px #4cb12d, 0 0 20px #0ea42c !important; }
        .flower__light { background-color: yellow !important; box-shadow: 0 0 5px yellow, 0 0 10px #ccea08 !important; }
    </style>
</head>

    <script>
        window.addEventListener('load', function() {
            const music = document.getElementById('background-music');
            music.play().catch(() => {
                document.body.addEventListener('click', () => music.play(), {once: true});
            });

            setTimeout(startParticles, 3000);
            setTimeout(startEffectsSequence, 8000);
        });

        // Partículas amarillas
        let PARTICLE_INTENSITY = 50;
        let PARTICLE_SPAWN_RATE = 500;
        const PARTICLE_SPEED = 0.5;
        const WIND_INTENSITY = 20;
        let particleInterval;

        function startParticles() {
            const particles = document.getElementById('particles');
            for (let i = 0; i < PARTICLE_INTENSITY; i++) createParticle();
            let intensityIncreaseInterval = setInterval(() => {
                PARTICLE_INTENSITY += 20;
                PARTICLE_SPAWN_RATE = Math.max(40, PARTICLE_SPAWN_RATE - 30);
                for (let i = 0; i < 10; i++) createParticle();
                if (PARTICLE_INTENSITY > 400 && PARTICLE_SPAWN_RATE <= 50) {
                    clearInterval(intensityIncreaseInterval);
                    PARTICLE_INTENSITY = 600;
                    PARTICLE_SPAWN_RATE = 40;
                    clearInterval(particleInterval);
                    particleInterval = setInterval(createParticle, PARTICLE_SPAWN_RATE);
                } else if (!particleInterval) {
                    particleInterval = setInterval(createParticle, PARTICLE_SPAWN_RATE);
                }
            }, 1000);
        }

        function createParticle() {
            const particles = document.getElementById('particles');
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            const opacity = Math.random() * 0.7 + 0.3;
            particle.style.opacity = opacity;
            const left = Math.random() * 100;
            const duration = Math.random() * PARTICLE_SPEED + PARTICLE_SPEED;
            const delay = Math.random() * 2;
            const tilt = (Math.random() * 20) - 10;
            const wind = (Math.random() * WIND_INTENSITY) - (WIND_INTENSITY / 2);
            particle.style.left = left + 'vw';
            particle.style.animationDelay = delay + 's';
            particle.style.animationDuration = duration + 's';
            particle.style.transform = `rotate(${tilt}deg)`;
            particle.style.setProperty('--wind', `${wind}px`);
            particles.appendChild(particle);
            setTimeout(() => { if (particle.parentNode) particle.remove(); }, (duration + delay) * 1000);
        }

        // Efectos + frase personalizada
        function startEffectsSequence() {
            const aura = document.createElement('div');
            aura.className = 'flower-aura';
            document.body.appendChild(aura);
            aura.style.opacity = '1';
            aura.style.height = '0';
            aura.style.transition = 'height 8s ease-out, opacity 8s ease-out';
            setTimeout(() => { aura.style.bottom = '0'; }, 50);

            setTimeout(() => { showHackerText(); }, 2000);

            setTimeout(() => {
                aura.style.opacity = '0';
                setTimeout(() => aura.remove(), 1000);
            }, 8000);
        }

        function showHackerText() {
            const message = "floresh tan dichosas y afortunadas de ser el bello regalito de tan bella mujelshita de toditash mi fantasías y deseitos de miel🫶💗🌸";
            const auraText = document.getElementById('aura-text');
            const finalMessage = document.getElementById('final-message');

            auraText.style.opacity = '1';
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            auraText.appendChild(cursor);

            const characters = message.split('');
            let currentIndex = 0;

            function showNextCharacter() {
                if (currentIndex < characters.length) {
                    if (currentIndex === 0 || characters[currentIndex-1] === ' ') {
                        const wordSpan = document.createElement('span');
                        auraText.insertBefore(wordSpan, cursor);
                    }
                    const lastSpan = auraText.querySelector('span:not(.cursor)');
                    if (lastSpan) lastSpan.textContent += characters[currentIndex];
                    setTimeout(() => {
                        if (lastSpan) {
                            lastSpan.style.opacity = '1';
                            lastSpan.style.transform = 'translateY(0)';
                        }
                    }, 50);
                    currentIndex++;
                    setTimeout(showNextCharacter, 120);
                } else {
                    cursor.remove();
                    setTimeout(() => {
                        auraText.style.opacity = '0';
                        finalMessage.textContent = message;
                        finalMessage.classList.add('active');
                    }, 1500);
                }
            }
            showNextCharacter();
        }
    </script>
