<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLORES PROTEGIDAS</title>
    <link rel="icon" href="img/flowers.png" type="image/x-icon">

    <!-- CSS principal de las flores (incluido aquí para que funcione seguro) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap');

        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background: #000;
            height: 100vh;
            font-family: 'Courier Prime', monospace;
        }

        .night {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #0a001f, #1a0033);
            z-index: 1;
        }

        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5; overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 5px; height: 5px;
            background: #ff0;
            border-radius: 50%;
            box-shadow: 0 0 12px #ff0;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(110vh) translateX(40px); }
        }

        /* === ANIMACIONES DE FLORES (esto era lo que faltaba) === */
        .flowers { position: relative; z-index: 10; height: 100vh; }
        .flower { position: absolute; bottom: -20px; animation: grow 12s forwards; }
        .flower--1 { left: 15%; }
        .flower--2 { left: 45%; animation-delay: 1.5s; }
        .flower--3 { left: 70%; animation-delay: 3s; }

        @keyframes grow {
            0%   { transform: scale(0.1) translateY(100px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Clases originales de tus flores (resumidas pero completas) */
        .flower__leafs, .flower__line, .grow-ans, .growing-grass { animation: grow-ans 12s forwards; }
        @keyframes grow-ans {
            from { transform: scale(0.1); }
            to   { transform: scale(1); }
        }

        /* Texto hacker */
        .aura-text {
            position: fixed; top: 12%; left: 50%; transform: translateX(-50%);
            font-size: 2.1rem; color: #8a2be2; text-shadow: 0 0 20px #8a2be2;
            text-align: center; z-index: 20; opacity: 0; white-space: pre-line;
        }
        .aura-text.active { opacity: 1; animation: glitch 0.4s infinite; }

        /* Mensaje final */
        .final-message {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2rem; line-height: 1.4; color: #ff3366; text-align: center;
            max-width: 90%; background: rgba(0,0,0,0.7); padding: 25px 35px;
            border-radius: 20px; z-index: 30; opacity: 0; transition: 1.8s;
        }
        .final-message.active { opacity: 1; }
    </style>
</head>
<body>

    <div class="night"></div>
    <div class="particles" id="particles"></div>

    <!-- Texto hacker -->
    <div class="aura-text" id="aura-text"></div>

    <!-- Mensaje final con tu texto -->
    <div class="final-message" id="final-message">
        floresh tan dichosas y afortunadas de ser el bello regalito<br>
        de tan bella mujelshita de toditash mi fantasías y deseitos de miel🫶💗🌸
    </div>

    <div class="flowers">
        <!-- Flor 1 -->
        <div class="flower flower--1">
            <div class="flower__leafs flower__leafs--1">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__white-circle"></div>
            </div>
            <div class="flower__line"></div>
        </div>

        <!-- Flor 2 -->
        <div class="flower flower--2">
            <div class="flower__leafs flower__leafs--2">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__white-circle"></div>
            </div>
            <div class="flower__line"></div>
        </div>

        <!-- Flor 3 -->
        <div class="flower flower--3">
            <div class="flower__leafs flower__leafs--3">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__white-circle"></div>
            </div>
            <div class="flower__line"></div>
        </div>

        <div class="grow-ans" style="animation-delay: 2s;">
            <div class="flower__g-long"></div>
        </div>

        <div class="growing-grass"></div>
    </div>

    <script>
        // Partículas amarillas
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 90; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 7 + 8) + 's';
                p.style.animationDelay = Math.random() * 4 + 's';
                p.style.opacity = Math.random() * 0.6 + 0.4;
                container.appendChild(p);
            }
        }

        // Efecto máquina de escribir
        function typeWriter(el, text, speed = 65) {
            let i = 0;
            el.innerHTML = '';
            el.classList.add('active');
            const timer = setInterval(() => {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                }
            }, speed);
        }

        // Secuencia principal
        window.onload = () => {
            createParticles();

            const aura = document.getElementById('aura-text');
            const finalMsg = document.getElementById('final-message');

            // Hacker text después de 7 segundos
            setTimeout(() => {
                typeWriter(aura, "MI FLOR AMARILLA...\nTE ESPERABA DESDE HACE TIEMPO");
            }, 7000);

            // Mensaje final después de 14 segundos
            setTimeout(() => {
                finalMsg.classList.add('active');
            }, 14000);
        };
    </script>
</body>
</html>
