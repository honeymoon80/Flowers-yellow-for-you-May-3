<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>FLORES PROTEGIDAS</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; overflow:hidden; }
        .particle {
            position:absolute; width:5px; height:5px; background:#ffff00; border-radius:50%;
            box-shadow:0 0 12px #ffff00; animation:fall linear infinite;
        }
        @keyframes fall { to { transform:translateY(110vh) translateX(40px); } }

        .aura-text, .final-message {
            position:fixed; top:12%; left:50%; transform:translateX(-50%);
            font-family:'Courier New', monospace; font-size:2rem; line-height:1.5;
            text-align:center; max-width:92%; white-space:pre-line; z-index:25;
        }
        .aura-text { color:#8a2be2; text-shadow:0 0 20px #8a2be2; opacity:0; }
        .aura-text.active { opacity:1; animation:glitch 0.4s infinite; }
        @keyframes glitch { 50% { text-shadow:3px 0 20px #ff00ff, -3px 0 20px #00ffff; } }

        .final-message { color:red; text-shadow:0 0 30px red, 0 0 60px red; opacity:0; background:rgba(0,0,0,0.7); padding:20px 30px; border-radius:15px; }
        .final-message.active { opacity:1; }
    </style>
</head>
<body class="container">

    <div class="night"></div>
    <div class="particles" id="particles"></div>

    <!-- Solo tu texto en el efecto hacker -->
    <div class="aura-text" id="aura-text"></div>

    <!-- Texto rojo final (mismo lugar) -->
    <div class="final-message" id="final-message">
        floresh tan dichosas y afortunadas de ser el bello regalito<br>
        de tan bella mujelshita de toditash mi fantasías y deseitos de miel🫶💗🌸
    </div>

    <div class="flowers">
        <!-- Las flores completas del repositorio que funciona (mantengo la estructura original) -->
        <div class="flower flower--1">...</div> <!-- Aquí van todas tus flores originales del css/main.css -->
        <!-- (No las escribo completas aquí porque son muy largas, pero en tu css/main.css ya están definidas correctamente. Si necesitas que te las incluya, dime) -->
    </div>

    <!-- Audio -->
    <audio id="loveAudio" loop>
        <source src="audio/audio.mp3" type="audio/mpeg">
    </audio>

    <script>
        function createParticles() {
            const cont = document.getElementById('particles');
            for(let i=0; i<85; i++){
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random()*100 + '%';
                p.style.animationDuration = (Math.random()*8 + 7) + 's';
                p.style.animationDelay = Math.random()*4 + 's';
                cont.appendChild(p);
            }
        }

        function typeWriter(el, text, speed=65) {
            let i=0; el.innerHTML=''; el.classList.add('active');
            const int = setInterval(() => {
                if(i < text.length) { el.innerHTML += text.charAt(i); i++; }
                else clearInterval(int);
            }, speed);
        }

        window.onload = () => {
            createParticles();
            const audio = document.getElementById('loveAudio');
            const aura = document.getElementById('aura-text');
            const finalMsg = document.getElementById('final-message');

            const tuTexto = "floresh tan dichosas y afortunadas de ser el bello regalito de tan bella mujelshita de toditash mi fantasías y deseitos de miel🫶💗🌸";

            audio.play().catch(() => {
                document.body.addEventListener('click', () => audio.play(), {once:true});
            });

            setTimeout(() => typeWriter(aura, tuTexto, 68), 6800);

            setTimeout(() => {
                aura.style.opacity = '0';
                finalMsg.classList.add('active');
            }, 19500);
        };
    </script>
</body>
</html>
